name: Build Docker Image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  # 允许读取仓库与在主分支推送镜像到 GHCR。
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 拉取仓库代码用于镜像构建。
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 QEMU 以支持多架构镜像构建。
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 初始化 Docker Buildx 构建器。
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 将仓库信息转成合法镜像标签。
      - name: Prepare image tags
        id: prep
        run: |
          repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${repo}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # 仅 main 分支推送时登录 GHCR。
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # PR 与手动触发只构建；main 推送会直接推送镜像。
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.prep.outputs.image }}:${{ steps.prep.outputs.sha_tag }}
            ${{ steps.prep.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
